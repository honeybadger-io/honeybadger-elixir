version: 2
updates:
- package-ecosystem: mix
  directory: "/"
  # Bump the requirement in mix.exs (not just mix.lock) when a new version
  # falls outside the declared constraint, e.g. req "~> 0.5.0" -> "~> 0.6.1".
  # Without this, a tight "~>" pin silently caps a dep and no PR is ever opened.
  versioning-strategy: increase
  schedule:
    interval: daily
    time: "09:00"
    timezone: America/Los_Angeles
  open-pull-requests-limit: 99
  ignore:
  - dependency-name: hackney
    versions:
    - 1.17.1
    - 1.17.2
    - 1.17.3
  - dependency-name: ex_doc
    versions:
    - 0.24.0
  - dependency-name: ecto
    versions:
    - 3.5.6
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
